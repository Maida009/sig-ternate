<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - SIG Tempat Ibadah Ternate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 56px;
            margin-bottom: 15px;
            color: #52b788;
        }
        
        .logo h1 { 
            color: #1e5128; 
            margin-bottom: 8px;
            font-size: 28px;
        }
        .logo p { color: #6c757d; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e5128;
            font-size: 14px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #52b788;
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.1);
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #52b788 0%, #40916c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-register:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.4);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message, .success-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .error-message {
            background: #fee;
            color: #c53030;
            border-left: 4px solid #e63946;
        }
        
        .success-message {
            background: #d8f3dc;
            color: #1e5128;
            border-left: 4px solid #52b788;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
            font-size: 14px;
        }
        
        .login-link a {
            color: #52b788;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">🕌</div>
            <h1>Daftar Akun Baru</h1>
            <p>SIG Tempat Ibadah Ternate</p>
        </div>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
            </div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Pilih username" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="contoh@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
            </div>
            
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
            </div>
            
            <button type="submit" class="btn-register" id="btnDaftar">📝 Daftar Sekarang</button>
        </form>
        
        <div class="login-link">
            Sudah punya akun? <a href="index.html">Login di sini</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btnDaftar = document.getElementById('btnDaftar');
            
            // Reset messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Validation
            if (password !== confirmPassword) {
                errorMsg.textContent = '❌ Password dan konfirmasi password tidak cocok!';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = '❌ Password minimal 6 karakter!';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check if username already exists
            if (users.find(u => u.username === username)) {
                errorMsg.textContent = '❌ Username sudah digunakan! Coba username lain.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Disable button
            btnDaftar.disabled = true;
            btnDaftar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftar...';
            
            // Create new user
            const newUser = {
                id: Date.now(),
                nama: nama,
                username: username,
                email: email,
                password: password,
                role: 'User',
                registeredAt: new Date().toISOString()
            };
            
            // Simulate loading
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Save user
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Show success message
            successMsg.textContent = '✅ Registrasi berhasil! Mengalihkan...';
            successMsg.style.display = 'block';
            
            // Auto login
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({
                username: username,
                nama: nama,
                email: email,
                role: 'User'
            }));
            localStorage.setItem('loginTime', new Date().toISOString());
            
            // Redirect to dashboard after 1.5 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
