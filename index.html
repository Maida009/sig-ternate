<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIG Tempat Ibadah Ternate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 56px;
            margin-bottom: 15px;
            color: #52b788;
        }
        
        .logo h1 { 
            color: #1e5128; 
            margin-bottom: 8px;
            font-size: 28px;
        }
        .logo p { color: #6c757d; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e5128;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #52b788;
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4a5568;
            cursor: pointer;
        }
        
        .form-options input { cursor: pointer; }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #52b788 0%, #40916c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 13px;
            border-left: 4px solid #52b788;
        }
        
        .info-box strong { color: #1e5128; }
        .info-box code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            color: #1e5128;
            font-weight: 600;
        }
        
        .error-message {
            background: #fee;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #e63946;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
            font-size: 14px;
        }
        
        .register-link a {
            color: #52b788;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .register-link a:hover { text-decoration: underline; }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #52b788; }
        .toast.error { background: #e63946; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🕌</div>
            <h1>SIG Tempat Ibadah</h1>
            <p>Kecamatan Ternate Selatan & Tengah</p>
        </div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe"> Ingat saya
                </label>
                <a href="#" style="color: #52b788; text-decoration: none;" onclick="showToast('Hubungi admin untuk reset password', 'error')">Lupa password?</a>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">🔑 Masuk</button>
        </form>
        
        <div class="info-box">
            <strong>🔐 Default Login:</strong><br>
            Username: <code>admin</code><br>
            Password: <code>admin123</code>
        </div>
        
        <div class="register-link">
            Belum punya akun? <a id="btnRegister">Daftar sekarang</a>
        </div>
    </div>

    <script>
        // ===================================================================
        // AUTH CHECK - Jika sudah login, langsung ke dashboard
        // ===================================================================
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        // ===================================================================
        // FIX LINK REGISTER - Menggunakan JavaScript agar pasti berfungsi
        // ===================================================================
        document.getElementById('btnRegister').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.assign('register.html');
        });

        // ===================================================================
        // LOGIN FORM HANDLER
        // ===================================================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');
            const btnLogin = document.getElementById('btnLogin');
            
            // Reset error
            errorMsg.style.display = 'none';
            
            // Disable button & show loading
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa...';
            
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Get registered users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check: Default Admin OR Registered User
            const isAdmin = (username === 'admin' && password === 'admin123');
            const registeredUser = users.find(u => u.username === username && u.password === password);
            
            if (isAdmin || registeredUser) {
                // ✅ LOGIN BERHASIL
                
                // Get user data
                const userData = isAdmin ? {
                    username: 'admin',
                    nama: 'Administrator',
                    email: 'admin@sig-ternate.id',
                    role: 'Super Admin'
                } : {
                    username: registeredUser.username,
                    nama: registeredUser.nama,
                    email: registeredUser.email,
                    role: registeredUser.role
                };
                
                // Save login session
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(userData));
                localStorage.setItem('loginTime', new Date().toISOString());
                
                if (rememberMe) {
                    localStorage.setItem('rememberedUser', username);
                }
                
                // Show success & redirect
                showToast('✅ Login berhasil! Mengalihkan...', 'success');
                
                setTimeout(() => {
                    window.location.replace('dashboard.html');
                }, 1200);
                
            } else {
                // ❌ LOGIN GAGAL
                errorMsg.textContent = '❌ Username atau password salah!';
                errorMsg.style.display = 'block';
                
                // Shake animation for error
                errorMsg.style.animation = 'none';
                setTimeout(() => {
                    errorMsg.style.animation = 'shake 0.3s ease';
                }, 10);
                
                // Reset button
                btnLogin.disabled = false;
                btnLogin.innerHTML = '🔑 Masuk';
                
                // Clear password field
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // ===================================================================
        // TOAST NOTIFICATION
        // ===================================================================
        function showToast(message, type) {
            // Remove existing toast
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            // Auto remove after 3 seconds
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ===================================================================
        // AUTO-FILL REMEMBERED USER
        // ===================================================================
        window.addEventListener('load', function() {
            const remembered = localStorage.getItem('rememberedUser');
            if (remembered) {
                document.getElementById('username').value = remembered;
                document.getElementById('rememberMe').checked = true;
                document.getElementById('password').focus();
            }
        });

        // ===================================================================
        // KEYBOARD SHORTCUT: Enter di password field = submit
        // ===================================================================
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').requestSubmit();
            }
        });
    </script>
</body>
</html>
