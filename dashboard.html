<!DOCTYPE html>
<html lang="id">
<head>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; }
        
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar - Hijau Gelap */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1e5128 0%, #2d6a4f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .logo i { font-size: 32px; color: #95d5b2; }
        
        .sidebar-nav { flex: 1; padding: 25px 0; overflow-y: auto; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: #d8f3dc;
            text-decoration: none;
            transition: all 0.3s;
            margin: 5px 12px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        
        .nav-item i { font-size: 18px; width: 24px; }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        
        .btn-logout {
            width: 100%;
            padding: 12px;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-logout:hover { background: #d62839; transform: translateY(-2px); }
        
        /* Main Content */
        .main-wrapper {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
        }
        
        .top-header {
            background: white;
            padding: 25px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-bottom: 3px solid #52b788;
        }
        
        .top-header h1 { 
            font-size: 26px; 
            color: #1e5128; 
            margin-bottom: 5px;
            font-weight: 700;
        }
        .top-header p { color: #6c757d; font-size: 14px; }
        
        .dashboard-content { padding: 30px; flex: 1; }
        
        /* Stats Grid - Tema Hijau */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            transition: all 0.3s;
            border-left: 4px solid #52b788;
        }
        
        .stat-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(30, 81, 40, 0.15);
        }
        
        .stat-icon {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .stat-icon.green-light { background: #d8f3dc; color: #40916c; }
        .stat-icon.green { background: #b7e4c7; color: #2d6a4f; }
        .stat-icon.green-dark { background: #95d5b2; color: #1e5128; }
        .stat-icon.green-accent { background: #52b788; color: white; }
        
        .stat-details h3 { 
            font-size: 32px; 
            color: #1e5128; 
            margin-bottom: 4px;
            font-weight: 700;
        }
        .stat-details p { color: #6c757d; font-size: 14px; }
        
        /* Charts - Tema Hijau */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            overflow: hidden;
            border: 1px solid #e9ecef;
        }
        
        .chart-header { 
            padding: 20px 25px; 
            border-bottom: 2px solid #d8f3dc;
            background: #f8fafc;
        }
        .chart-header h3 { 
            font-size: 16px; 
            color: #1e5128;
            font-weight: 600;
        }
        .chart-body { padding: 25px; }
        
        /* Quick Actions - Tema Hijau */
        .quick-actions {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            border: 1px solid #e9ecef;
        }
        
        .quick-actions h3 { 
            margin-bottom: 20px; 
            color: #1e5128;
            font-weight: 600;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .action-btn {
            padding: 20px;
            background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            border: 2px solid #95d5b2;
            border-radius: 10px;
            text-decoration: none;
            color: #1e5128;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #b7e4c7 0%, #95d5b2 100%);
            border-color: #52b788;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.3);
        }
        
        .action-btn i { 
            font-size: 24px; 
            color: #2d6a4f; 
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }

        }

        // Check authentication & load data
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
                return;
            }
            
            loadDashboardData();
        });

        function loadDashboardData() {
            // Load dari localStorage ATAU gunakan default data
            const storedData = localStorage.getItem('placesOfWorship');
            const places = storedData ? JSON.parse(storedData) : defaultData;
            
            // Hitung statistik
            const totalMasjid = places.filter(p => p.agama === 'Islam' || p.jenis === 'Masjid').length;
            const totalGereja = places.filter(p => p.agama === 'Kristen' || p.jenis === 'Gereja').length;
            const totalTengah = places.filter(p => p.kecamatan === 'Ternate Tengah').length;
            const totalSelatan = places.filter(p => p.kecamatan === 'Ternate Selatan').length;
            
            // Update UI
            document.getElementById('totalTempatIbadah').textContent = places.length;
            document.getElementById('totalMasjid').textContent = totalMasjid;
            document.getElementById('totalGereja').textContent = totalGereja;
            
            // Chart Kecamatan (Doughnut) - Tema Hijau
            new Chart(document.getElementById('kecamatanChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Ternate Tengah', 'Ternate Selatan'],
                    datasets: [{
                        data: [totalTengah, totalSelatan],
                        backgroundColor: ['#52b788', '#2d6a4f'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { 
                                padding: 15, 
                                usePointStyle: true,
                                color: '#1e5128',
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
            
            // Chart Kategori (Bar) - Tema Hijau
            new Chart(document.getElementById('kategoriChart'), {
                type: 'bar',
                data: {
                    labels: ['Masjid', 'Gereja'],
                    datasets: [{
                        label: 'Jumlah',
                        data: [totalMasjid, totalGereja],
                        backgroundColor: ['#52b788', '#95d5b2'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { 
                        legend: { display: false } 
                    },
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            ticks: { 
                                stepSize: 5,
                                color: '#6c757d'
                            },
                            grid: { color: '#e9ecef' }
                        },
                        x: {
                            ticks: { color: '#1e5128' },
                            grid: { display: false }
                        }
                    }
                }
            });
            
            console.log('✅ Dashboard loaded');
            console.log(`📊 Total: ${places.length} tempat ibadah`);
            console.log(`🕌 Masjid: ${totalMasjid}`);
            console.log(`⛪ Gereja: ${totalGereja}`);
        }

        function logout() {
            if(confirm('Apakah Anda yakin ingin keluar?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
