<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SIG Tempat Ibadah Ternate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- ⚠️ PENTING: Load config.js untuk koneksi Supabase -->
    <script src="js/config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; }
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1e5128 0%, #2d6a4f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            left: 0; top: 0; z-index: 1000;
            display: flex; flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: bold; }
        .logo i { font-size: 32px; color: #95d5b2; }
        .sidebar-nav { flex: 1; padding: 25px 0; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; color: #d8f3dc;
            text-decoration: none; transition: all 0.3s;
            margin: 5px 12px; border-radius: 10px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
        .nav-item i { font-size: 18px; width: 24px; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.15); }
        .btn-logout {
            width: 100%; padding: 12px; background: #e63946; color: white;
            border: none; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 14px; font-weight: 600; transition: all 0.3s;
        }
        .btn-logout:hover { background: #d62839; transform: translateY(-2px); }
        
        /* Main Content */
        .main-wrapper { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
        .top-header {
            background: white; padding: 25px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-bottom: 3px solid #52b788;
        }
        .top-header h1 { font-size: 26px; color: #1e5128; margin-bottom: 5px; font-weight: 700; }
        .top-header p { color: #6c757d; font-size: 14px; }
        .dashboard-content { padding: 30px; flex: 1; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 25px; border-radius: 12px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            transition: all 0.3s; border-left: 4px solid #52b788;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(30, 81, 40, 0.15); }
        .stat-icon {
            width: 65px; height: 65px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
        }
        .stat-icon.green-light { background: #d8f3dc; color: #40916c; }
        .stat-icon.green { background: #b7e4c7; color: #2d6a4f; }
        .stat-icon.green-dark { background: #95d5b2; color: #1e5128; }
        .stat-icon.green-accent { background: #52b788; color: white; }
        .stat-details h3 { font-size: 32px; color: #1e5128; margin-bottom: 4px; font-weight: 700; }
        .stat-details p { color: #6c757d; font-size: 14px; }
        
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            overflow: hidden; border: 1px solid #e9ecef;
        }
        .chart-header { padding: 20px 25px; border-bottom: 2px solid #d8f3dc; background: #f8fafc; }
        .chart-header h3 { font-size: 16px; color: #1e5128; font-weight: 600; }
        .chart-body { padding: 25px; position: relative; min-height: 300px; }
        
        /* Quick Actions */
        .quick-actions {
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(30, 81, 40, 0.08);
            border: 1px solid #e9ecef;
        }
        .quick-actions h3 { margin-bottom: 20px; color: #1e5128; font-weight: 600; }
        .action-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .action-btn {
            padding: 20px;
            background: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 100%);
            border: 2px solid #95d5b2; border-radius: 10px;
            text-decoration: none; color: #1e5128;
            display: flex; align-items: center; gap: 12px;
            transition: all 0.3s; font-weight: 600;
        }
        .action-btn:hover {
            background: linear-gradient(135deg, #b7e4c7 0%, #95d5b2 100%);
            border-color: #52b788; transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(82, 183, 136, 0.3);
        }
        .action-btn i { font-size: 24px; color: #2d6a4f; }
        
        /* Loading Overlay (Non-destructive) */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 12px;
        }
        .loading-overlay.hidden { display: none; }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 4px solid #e9ecef;
            border-top-color: #52b788;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .main-wrapper { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-map-marked-alt"></i><span>SIG Ternate</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="peta.html" class="nav-item"><i class="fas fa-map"></i><span>Peta</span></a>
                <a href="data.html" class="nav-item"><i class="fas fa-database"></i><span>Data</span></a>
                <a href="user.html" class="nav-item"><i class="fas fa-user"></i><span>User</span></a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i><span>Keluar</span></button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-header">
                <h1>Dashboard Statistik</h1>
                <p>Data Tempat Ibadah - Kecamatan Ternate Selatan & Tengah</p>
            </header>

            <main class="dashboard-content">
                <!-- Loading Overlay (inside content) -->
                <div id="loadingOverlay" class="loading-overlay hidden">
                    <div class="loading-spinner"></div>
                </div>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon green-light"><i class="fas fa-users"></i></div>
                        <div class="stat-details">
                            <h3 id="totalTempatIbadah">0</h3>
                            <p>Total Tempat Ibadah</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-mosque"></i></div>
                        <div class="stat-details">
                            <h3 id="totalMasjid">0</h3>
                            <p>Total Masjid</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green-dark"><i class="fas fa-church"></i></div>
                        <div class="stat-details">
                            <h3 id="totalGereja">0</h3>
                            <p>Total Gereja</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green-accent"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="stat-details">
                            <h3 id="totalKecamatan">2</h3>
                            <p>Kecamatan</p>
                        </div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-pie" style="margin-right:8px;color:#52b788;"></i>Distribusi per Kecamatan</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="kecamatanChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-bar" style="margin-right:8px;color:#52b788;"></i>Distribusi per Kategori</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="kategoriChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <h3><i class="fas fa-bolt" style="margin-right:8px;color:#52b788;"></i>Aksi Cepat</h3>
                    <div class="action-buttons">
                        <a href="peta.html" class="action-btn"><i class="fas fa-map"></i><span>Lihat Peta</span></a>
                        <a href="data.html" class="action-btn"><i class="fas fa-plus-circle"></i><span>Tambah Data</span></a>
                        <a href="data.html" class="action-btn"><i class="fas fa-edit"></i><span>Kelola Data</span></a>
                        <a href="user.html" class="action-btn"><i class="fas fa-user-cog"></i><span>Profil User</span></a>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ===================================================================
        // GLOBAL VARIABLES
        // ===================================================================
        let places = [];
        let kecamatanChart = null;
        let kategoriChart = null;
        const defaultData = [
            { id: 1, nama: "Masjid Babul Jannah", agama: "Islam", jenis: "Masjid", kecamatan: "Ternate Tengah", kelurahan: "Makassar Barat", kapasitas: 500, latitude: 0.79745, longitude: 127.3637013 },
            { id: 33, nama: "GPM Immanuel Ternate", agama: "Kristen", jenis: "Gereja", kecamatan: "Ternate Tengah", kelurahan: "Stadion", kapasitas: 350, latitude: 0.78707, longitude: 127.38577 }
        ];

        // ===================================================================
        // INIT & AUTH
        // ===================================================================
        window.addEventListener('load', async function() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return;
            }
            await loadDashboardData();
        });

        // ===================================================================
        // LOAD DATA FROM SUPABASE
        // ===================================================================
        async function loadDashboardData() {
            showLoading();
            
            try {
                console.log('🔄 Fetching dashboard data from Supabase...');
                
                const connected = await testConnection();
                if (!connected) {
                    console.warn('⚠️ Supabase connection failed, using default data');
                    places = [...defaultData];
                    renderDashboard();
                    return;
                }
                
                const rawData = await getDataIbadah();
                
                if (rawData && rawData.length > 0) {
                    // Gunakan formatDataIbadah dari config.js untuk konsistensi
                    places = formatDataIbadah(rawData);
                    console.log('✅ Loaded', places.length, 'places');
                } else {
                    console.log('⚠️ Database empty, using default data');
                    places = [...defaultData];
                }
                
                renderDashboard();
                
            } catch (error) {
                console.error('❌ Dashboard load error:', error);
                places = [...defaultData];
                renderDashboard();
            } finally {
                hideLoading();
            }
        }

        // ===================================================================
        // RENDER DASHBOARD
        // ===================================================================
        function renderDashboard() {
            const totalMasjid = places.filter(p => p.jenis === 'Masjid').length;
            const totalGereja = places.filter(p => p.jenis === 'Gereja').length;
            const totalTengah = places.filter(p => p.kecamatan === 'Ternate Tengah').length;
            const totalSelatan = places.filter(p => p.kecamatan === 'Ternate Selatan').length;
            
            // Update stats
            document.getElementById('totalTempatIbadah').textContent = places.length;
            document.getElementById('totalMasjid').textContent = totalMasjid;
            document.getElementById('totalGereja').textContent = totalGereja;
            
            // Render charts with delay to ensure canvas is ready
            setTimeout(() => {
                renderKecamatanChart(totalTengah, totalSelatan);
                renderKategoriChart(totalMasjid, totalGereja);
            }, 100);
            
            console.log('📊 Dashboard rendered');
        }

        // ===================================================================
        // CHART FUNCTIONS
        // ===================================================================
        function renderKecamatanChart(tengah, selatan) {
            const ctx = document.getElementById('kecamatanChart');
            if (!ctx) return;
            
            if (kecamatanChart) kecamatanChart.destroy();
            
            kecamatanChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ternate Tengah', 'Ternate Selatan'],
                    datasets: [{
                        data: [tengah, selatan],
                        backgroundColor: ['#52b788', '#2d6a4f'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { 
                                padding: 15, usePointStyle: true,
                                color: '#1e5128', font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        function renderKategoriChart(masjid, gereja) {
            const ctx = document.getElementById('kategoriChart');
            if (!ctx) return;
            
            if (kategoriChart) kategoriChart.destroy();
            
            kategoriChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Masjid', 'Gereja'],
                    datasets: [{
                        label: 'Jumlah',
                        data: [masjid, gereja],
                        backgroundColor: ['#52b788', '#95d5b2'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            ticks: { stepSize: 5, color: '#6c757d' },
                            grid: { color: '#e9ecef' }
                        },
                        x: { ticks: { color: '#1e5128' }, grid: { display: false } }
                    }
                }
            });
        }

        // ===================================================================
        // UTILITIES
        // ===================================================================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        
        function logout() {
            if(confirm('Apakah Anda yakin ingin keluar?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
        
        // Auto-refresh dashboard when storage changes (dari halaman data.html)
        window.addEventListener('storage', function(e) {
            if (e.key === 'placesOfWorship' || e.key === 'dashboardRefresh') {
                console.log('🔄 Data changed, refreshing dashboard...');
                loadDashboardData();
            }
        });
    </script>
</body>
</html>
