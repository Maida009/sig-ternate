<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - SIG Tempat Ibadah Ternate</title>
    <link rel="stylesheet" href="css/dashboard-layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stat-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .summary-card h4 { margin: 0 0 5px; color: #718096; font-size: 14px; }
        .summary-card .value { font-size: 32px; font-weight: bold; margin: 0; }
        .color-masjid { color: #10b981; }
        .color-gereja { color: #3b82f6; }
        .color-pura { color: #f59e0b; }
        .color-vihara { color: #8b5cf6; }
        .color-total { color: #2d3748; }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chart-box h3 { margin: 0 0 15px; font-size: 16px; color: #2d3748; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-map-marked-alt"></i><span>Banten Ternate</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="peta.html" class="nav-item"><i class="fas fa-map"></i><span>Peta Sebaran</span></a>
                <a href="data.html" class="nav-item"><i class="fas fa-database"></i><span>Data</span></a>
                <a href="statistik.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Statistik</span></a>
                <div class="nav-section">
                    <span class="nav-section-title">Lainnya</span>
                    <a href="#" class="nav-item"><i class="fas fa-info-circle"></i><span>Tentang</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i><span>Keluar</span></button>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <h1>Analitik & Statistik</h1>
                    <p>Ringkasan data tempat ibadah di Kota Ternate</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span class="user-name">Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </header>

            <main class="dashboard-content">
                <div class="stat-summary-grid" id="summaryCards">
                    <!-- Diisi oleh JS -->
                </div>

                <div class="charts-container">
                    <div class="chart-box">
                        <h3>Distribusi Berdasarkan Kategori</h3>
                        <canvas id="chartKategori"></canvas>
                    </div>
                    <div class="chart-box">
                        <h3>Distribusi Berdasarkan Kecamatan</h3>
                        <canvas id="chartKecamatan"></canvas>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';
            loadStats();
        });

        function loadStats() {
            const stored = localStorage.getItem('placesOfWorship');
            const places = stored ? JSON.parse(stored) : [];
            
            // Hitung statistik
            const stats = {
                total: places.length,
                masjid: places.filter(p => p.kategori === 'Masjid').length,
                gereja: places.filter(p => p.kategori === 'Gereja').length,
                pura: places.filter(p => p.kategori === 'Pura').length,
                vihara: places.filter(p => p.kategori === 'Vihara').length,
                ternateSelatan: places.filter(p => p.kecamatan === 'Ternate Selatan').length,
                ternateTengah: places.filter(p => p.kecamatan === 'Ternate Tengah').length
            };

            // Render Summary Cards
            document.getElementById('summaryCards').innerHTML = `
                <div class="summary-card">
                    <h4>Total Tempat Ibadah</h4>
                    <p class="value color-total">${stats.total}</p>
                </div>
                <div class="summary-card">
                    <h4>Masjid</h4>
                    <p class="value color-masjid">${stats.masjid}</p>
                </div>
                <div class="summary-card">
                    <h4>Gereja</h4>
                    <p class="value color-gereja">${stats.gereja}</p>
                </div>
                <div class="summary-card">
                    <h4>Pura</h4>
                    <p class="value color-pura">${stats.pura}</p>
                </div>
                <div class="summary-card">
                    <h4>Vihara</h4>
                    <p class="value color-vihara">${stats.vihara}</p>
                </div>
                <div class="summary-card">
                    <h4>Ternate Selatan</h4>
                    <p class="value">${stats.ternateSelatan}</p>
                </div>
                <div class="summary-card">
                    <h4>Ternate Tengah</h4>
                    <p class="value">${stats.ternateTengah}</p>
                </div>
            `;

            // Render Charts
            renderKategoriChart(stats);
            renderKecamatanChart(stats);
        }

        function renderKategoriChart(stats) {
            const ctx = document.getElementById('chartKategori').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Masjid', 'Gereja', 'Pura', 'Vihara'],
                    datasets: [{
                        label: 'Jumlah',
                        data: [stats.masjid, stats.gereja, stats.pura, stats.vihara],
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6'],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function renderKecamatanChart(stats) {
            const ctx = document.getElementById('chartKecamatan').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ternate Selatan', 'Ternate Tengah'],
                    datasets: [{
                        data: [stats.ternateSelatan, stats.ternateTengah],
                        backgroundColor: ['#10b981', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function logout() {
            if(confirm('Keluar dari sistem?')) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
